<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smit Search</title>

<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom right, #0f2027, #203a43, #2c5364);
    overflow: hidden;
    color: white;
}

/* ================= NAVBAR ================= */

.navbar{
    width: 100%;
    height: 70px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 0 40px;
}

.logo{
    font-size: 28px;
    font-weight: bold;
}

.nav-links{
    display: flex;
    gap: 20px;
}

.nav-links button{
    padding: 10px 20px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 15px;
    transition: 0.3s;
}

.login-btn{
    background: transparent;
    color: white;
    border: 2px solid white !important;
}

.signup-btn{
    background: white;
    color: black;
}

.nav-links button:hover{
    transform: scale(1.05);
}

/* ================= CENTER SECTION ================= */

.main{
    height: calc(100vh - 70px);

    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.main h1{
    font-size: 70px;
    margin-bottom: 10px;
}

.main p{
    margin-bottom: 30px;
    color: #d9d9d9;
}

/* ================= SEARCH BAR ================= */

.search-container{
    width: 100%;
    display: flex;
    justify-content: center;
}

.search-box{
    width: 55%;
    height: 55px;
    border: none;
    outline: none;
    border-radius: 50px;
    padding: 0 25px;
    font-size: 18px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color: white;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.search-box::placeholder{
    color: #e0e0e0;
}

.search-box:focus{
    transform: scale(1.02);
    box-shadow: 0 0 30px rgba(255,255,255,0.2);
}

/* ================= SHORTCUT BUTTONS ================= */

.shortcuts{
    margin-top: 35px;
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    justify-content: center;
}

.shortcut-btn{
    padding: 12px 20px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.15);
    color: white;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.shortcut-btn:hover{
    background: rgba(255,255,255,0.25);
    transform: translateY(-3px);
}


</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->

<div class="navbar">

    <div class="logo">
        SmitSearch
    </div>

    <div class="nav-links">
        <button class="login-btn">Login</button>
        <button class="signup-btn">Sign Up</button>
    </div>

</div>

<!-- ================= MAIN ================= -->

<div class="main">

    <h1>Wassup 😎</h1>

    <p>Your personal clean search page.</p>


    <div class="search-container">

        <input 
        type="text" 
        id="SearchBox" 
        class="search-box"
        placeholder="Search anything..."
        >

    </div>

    <!-- SHORTCUTS -->

    <div class="shortcuts">

        <button class="shortcut-btn">YouTube</button>

        <button class="shortcut-btn">Instagram</button>

        <button class="shortcut-btn">GitHub</button>

        <button class="shortcut-btn">ChatGPT</button>

        <button class="shortcut-btn">Settings</button>

    </div>

</div>

<!-- FOOTER -->




<!-- ================= JAVASCRIPT ================= -->

<script>

function searchGoogle(){

    let text = document.getElementById("SearchBox").value;

    window.location.href = 
    "https://www.google.com/search?q=" + text;
}

document.getElementById("SearchBox")
.addEventListener("keydown", function(event){

    if(event.key === "Enter"){
        searchGoogle();
    }

});

</script>

</body>
</html>
